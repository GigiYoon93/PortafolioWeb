<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Mi Portafolio</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <h1>Portafolio</h1>
        <p>Estudiante de Ingeniería en Sistemas Computacionales</p>
    </header>

    <nav class="navbar">
        <a href="index.html">Inicio</a>
        <a href="sobre-mi.html">Sobre mí</a>

        <a href="proyectos.html">Proyectos</a>
        <a href="contacto.html" class="active">Contacto</a>
    </nav>

    <div class="container">

        <main class="main main-full">

            <div class="bloque">

                <div class="formcontainer">
                    <h2>Formulario de contacto</h2>
                    <p>Llena el formulario</p>

                    <form>
                        <label for="nombre">¿Cómo te llamas?</label>
                        <input type="text" id="nombre" placeholder="Tu nombre">

                        <label for="email">¿Cuál es tu correo?</label>
                        <input type="email" id="email" placeholder="tucorreo@ejemplo.com">

                        <label for="asunto">¿De qué va el mensaje?</label>
                        <input type="text" id="asunto" placeholder="Asunto del mensaje">

                        <label for="mensaje">Comentarios</label>
                        <textarea id="mensaje" rows="5" placeholder="Escribe lo que quieras..."></textarea>

                        <button type="submit">Enviar mensaje</button>
                    </form>
                </div>

                <h3 style="text-align:center;margin:10px 0 16px">Encuéntrame en</h3>
                <div class="contacto-links">

                    <a href="233s0020@itsta.edu.mx" class="contact-link">
                        233s0020@itsta.edu.mx
                    </a>

                    <a href="tel:+527891304188" class="contact-link">
                        +52 789 130 4188
                    </a>
                </div>
            </div>

        </main>

    </div>

    <footer>
        Michelle · Programación Web
    </footer>

</body>
